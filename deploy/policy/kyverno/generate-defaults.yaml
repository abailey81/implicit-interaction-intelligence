# ─── Kyverno ClusterPolicy: generate a default-deny NetworkPolicy ──────────
#
# When a namespace is created, auto-generate a NetworkPolicy that denies all
# ingress and all egress traffic.  Operators then opt-in by adding explicit
# allow rules.  This complements `network-policy-required.yaml` and
# implements the zero-trust baseline from the Kyverno Pod Security Standard.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-default-deny-netpol
  annotations:
    policies.kyverno.io/title: Generate default-deny NetworkPolicy on namespace creation
    policies.kyverno.io/category: Multi-Tenancy
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Namespace, NetworkPolicy
    policies.kyverno.io/description: >-
      On creation of any namespace, generates a NetworkPolicy that denies
      all ingress and egress traffic, establishing a deny-by-default posture.
spec:
  generateExisting: false
  rules:
    - name: create-default-deny
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - cert-manager
                - ingress-nginx
      generate:
        synchronize: true
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: default-deny
        namespace: "{{ request.object.metadata.name }}"
        data:
          metadata:
            labels:
              app.kubernetes.io/managed-by: kyverno
              policy.i3.dev/kind: default-deny
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress
