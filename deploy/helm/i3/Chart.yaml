apiVersion: v2
name: i3
description: |
  Implicit Interaction Intelligence (I3) — a FastAPI + PyTorch service that
  learns implicit signals from user interactions and provides personalized
  adaptation. This chart installs the I3 server with production-grade
  defaults: rolling updates, horizontal autoscaling, pod disruption budgets,
  network policies, and optional ServiceMonitor for Prometheus Operator.
type: application
version: 0.1.0
appVersion: "1.0.0"
kubeVersion: ">=1.26.0-0"
home: https://github.com/abailey81/implicit-interaction-intelligence
sources:
  - https://github.com/abailey81/implicit-interaction-intelligence
icon: https://raw.githubusercontent.com/abailey81/implicit-interaction-intelligence/main/docs/logo.png
keywords:
  - i3
  - implicit-interaction
  - machine-learning
  - pytorch
  - fastapi
  - personalization
  - anthropic
maintainers:
