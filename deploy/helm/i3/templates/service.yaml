apiVersion: v1
kind: Service
metadata:
  name: {{ include "i3.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "i3.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "i3.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
