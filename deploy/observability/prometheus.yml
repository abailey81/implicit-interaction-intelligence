global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: i3
    stack: observability

scrape_configs:
  # ---------------------------------------------------------------------
  # I3 application server.  The compose stack uses host.docker.internal
  # so the container can reach the app running on the host machine at
  # port 8000.  Override by editing this file or running the server
  # inside the same docker network.
  # ---------------------------------------------------------------------
  - job_name: i3-server
    metrics_path: /api/metrics
    scheme: http
    static_configs:
      - targets:
          - host.docker.internal:8000
        labels:
          service: i3
          component: server

  # ---------------------------------------------------------------------
  # OTel Collector's Prometheus exporter — this is how metrics delivered
  # to the collector via OTLP become scrape-visible.
  # ---------------------------------------------------------------------
  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets:
          - otel-collector:8889
        labels:
          component: otel-collector

  # ---------------------------------------------------------------------
  # Collector-internal telemetry (receiver queue depth, batch sizes).
  # ---------------------------------------------------------------------
  - job_name: otel-collector-internal
    metrics_path: /metrics
    static_configs:
      - targets:
          - otel-collector:8888
        labels:
          component: otel-collector-internal

  - job_name: prometheus-self
    static_configs:
      - targets:
          - localhost:9090
