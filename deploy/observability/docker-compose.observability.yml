version: "3.9"

# Standalone observability stack for the I3 server.
#
# Run alongside the application:
#
#     docker compose -f deploy/observability/docker-compose.observability.yml up -d
#
# The application is expected to listen on http://host.docker.internal:8000 by
# default (override via I3_SERVER_TARGET in .env).  Point the app at the
# collector with OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317 when you
# run it from the host, or http://otel-collector:4317 from inside docker.

networks:
  i3-observability:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  tempo-data:

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: i3-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape endpoint (collector-internal metrics)
      - "13133:13133" # healthcheck extension
    networks:
      - i3-observability
    depends_on:
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: i3-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - i3-observability
    extra_hosts:
      # Allow Prometheus to scrape the I3 server running on the host.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 3s
      retries: 5

  tempo:
    image: grafana/tempo:2.5.0
    container_name: i3-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (Grafana datasource)
      - "4319:4317"   # OTLP gRPC (Tempo-native, distinct from collector port)
    networks:
      - i3-observability
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:11.1.0
    container_name: i3-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - i3-observability
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
