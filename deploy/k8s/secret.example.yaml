# EXAMPLE ONLY — DO NOT COMMIT REAL SECRETS.
#
# This file demonstrates the Secret shape expected by the I3 deployment.
# Copy it to a local file (e.g. `secret.yaml`), fill in real values, and apply
# it with `kubectl apply -f secret.yaml` — but NEVER commit the populated
# copy. Production clusters should use SealedSecrets, External Secrets
# Operator, or a KMS-backed solution. A SealedSecret snippet is at the bottom.
---
apiVersion: v1
kind: Secret
metadata:
  name: i3-secrets
  namespace: i3
  labels:
    app.kubernetes.io/name: i3
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: i3
    app.kubernetes.io/managed-by: kustomize
type: Opaque
stringData:
  # Fernet-compatible key used by i3.security.ModelEncryptor to encrypt
  # checkpoints and diary rows at rest. Generate with:
  #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  I3_ENCRYPTION_KEY: "REPLACE_ME_WITH_BASE64_FERNET_KEY"
  # Anthropic API key. Create at https://console.anthropic.com/settings/keys.
  ANTHROPIC_API_KEY: "REPLACE_ME_WITH_ANTHROPIC_KEY"
---
# ---------------------------------------------------------------------------
# SealedSecret example (requires bitnami-labs/sealed-secrets controller).
#
# Generate with kubeseal after populating a plaintext Secret locally:
#
#   kubeseal --format=yaml --cert mycluster-pub.pem \
#       < secret.yaml > sealedsecret.yaml
#
# The resulting document looks like the one below. SealedSecrets are safe to
# commit because only the cluster-specific controller can decrypt them.
# ---------------------------------------------------------------------------
# apiVersion: bitnami.com/v1alpha1
# kind: SealedSecret
# metadata:
#   name: i3-secrets
#   namespace: i3
# spec:
#   encryptedData:
#     I3_ENCRYPTION_KEY: AgB...ciphertext...==
#     ANTHROPIC_API_KEY: AgC...ciphertext...==
#   template:
#     metadata:
#       name: i3-secrets
#       namespace: i3
#       labels:
#         app.kubernetes.io/name: i3
#         app.kubernetes.io/part-of: i3
#     type: Opaque
