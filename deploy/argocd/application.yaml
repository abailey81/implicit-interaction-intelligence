# ArgoCD Application — GitOps deployment of the I3 Helm chart.
#
# Apply this manifest once (bootstrap) — thereafter ArgoCD keeps the cluster
# in sync with the Helm chart under `deploy/helm/i3` on the main branch.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: i3-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: i3
    app.kubernetes.io/part-of: i3
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: i3

  source:
    repoURL: https://github.com/abailey81/implicit-interaction-intelligence.git
    targetRevision: main
    path: deploy/helm/i3
    helm:
      releaseName: i3
      valueFiles:
        - values.yaml
        - values-prod.yaml
      # Individual overrides go here. Secrets must NOT be inlined — reference
      # a SealedSecret/ExternalSecret in the target namespace instead.
      parameters:
        - name: image.tag
          value: "1.0.0"
        - name: envFromSecret.existingSecret
          value: "i3-secrets"

  destination:
    server: https://kubernetes.default.svc
    namespace: i3-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m

  revisionHistoryLimit: 10

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas      # managed by HPA
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /status

# -----------------------------------------------------------------------------
# Maintenance windows live on the AppProject (deploy/argocd/appproject.yaml);
# see the `syncWindows` block there for the canonical examples. Uncomment
# there to prevent automated syncs during sensitive periods.
# -----------------------------------------------------------------------------
