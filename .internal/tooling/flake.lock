{
  "_comment": [
    "---------------------------------------------------------------------",
    "PLACEHOLDER flake.lock",
    "---------------------------------------------------------------------",
    "This file is a placeholder. A real Nix flake.lock contains pinned",
    "revisions + narHashes for every input declared in flake.nix. That lock",
    "cannot be hand-written meaningfully — it must be generated by Nix",
    "itself so that narHashes match the store contents byte-for-byte.",
    "",
    "After cloning this repository for the first time, run:",
    "",
    "    nix flake update",
    "",
    "which will resolve the current revisions of:",
    "    - github:NixOS/nixpkgs/nixos-unstable",
    "    - github:numtide/flake-utils",
    "",
    "and overwrite this placeholder with a real lock file. Then commit the",
    "resulting flake.lock so CI and other developers share the same pins.",
    "",
    "Nix experimental features required: nix-command flakes",
    "e.g. in ~/.config/nix/nix.conf :",
    "    experimental-features = nix-command flakes",
    "---------------------------------------------------------------------"
  ],
  "nodes": {
    "root": {
      "inputs": {
        "flake-utils": "flake-utils",
        "nixpkgs":     "nixpkgs"
      }
    },
    "nixpkgs":     { "_placeholder": true, "original": { "owner": "NixOS",  "repo": "nixpkgs",     "ref": "nixos-unstable", "type": "github" } },
    "flake-utils": { "_placeholder": true, "original": { "owner": "numtide", "repo": "flake-utils", "type": "github" } }
  },
  "root":    "root",
  "version": 7
}
