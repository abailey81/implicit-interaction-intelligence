name: continuous-profiling

# Runs the I^3 benchmark suite with the Pyroscope Python SDK enabled and
# publishes both the raw pprof artifacts and a short Markdown summary.
#
# This complements (does not replace) the always-on Pyroscope agent that
# profiles the production pods -- the benefit of a CI run is reproducible
# profiles tied to specific commits / PRs.

on:
  workflow_dispatch:
    inputs:
      benchmark_filter:
        description: "Pytest -k filter for which benchmarks to run"
        required: false
        default: ""
  schedule:
    # Every night at 02:17 UTC -- staggered to avoid GH API rate-limits.
    - cron: "17 2 * * *"
  pull_request:
    paths:
      - "i3/**"
      - "benchmarks/**"
      - "pyproject.toml"

permissions:
  contents: read
  pull-requests: write   # so we can comment the flame-graph summary

concurrency:
  group: pyroscope-${{ github.ref }}
  cancel-in-progress: true

jobs:
  profile:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    services:
      pyroscope:
        image: grafana/pyroscope:1.5.0
        ports:
          - 4040:4040

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pyroscope-io==0.8.8

      - name: Wait for Pyroscope
        run: |
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:4040/ready && break
            sleep 1
          done

      - name: Run benchmarks with profiler
        env:
          PYROSCOPE_SERVER_URL: http://127.0.0.1:4040
          PYROSCOPE_APPLICATION_NAME: i3-benchmarks
          PYROSCOPE_ENABLE_ALLOC: "true"
          I3_ENV: ci
        run: |
          pytest benchmarks/ \
            -q \
            --pyroscope \
            -k "${{ github.event.inputs.benchmark_filter }}" \
            --junitxml=benchmark-report.xml

      - name: Pull profiles out of Pyroscope
        run: |
          mkdir -p profiles
          for profile in cpu alloc_objects inuse_space; do
            curl -sf "http://127.0.0.1:4040/pyroscope/render?query=i3-benchmarks.$profile&format=pprof" \
              -o "profiles/${profile}.pprof" || true
          done

      - name: Upload profile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pyroscope-profiles-${{ github.sha }}
          path: |
            profiles/
            benchmark-report.xml
          retention-days: 30

      - name: Comment PR with summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### Pyroscope profiling run',
              '',
              `Commit: \`${context.sha.substring(0, 8)}\``,
              `Artifacts: pyroscope-profiles-${context.sha}`,
              '',
              'Download the pprof files and open them with:',
              '```sh',
              'go tool pprof -http=:0 profiles/cpu.pprof',
              '```',
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
