name: Bug Report
description: Report a reproducible bug or unexpected behavior in I³
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the form below
        as completely as possible so we can diagnose and resolve the issue quickly.

        **Before submitting:**
        - Search [existing issues](https://github.com/abailey81/implicit-interaction-intelligence/issues) to avoid duplicates.
        - If this is a security vulnerability, please use [GitHub Security Advisories](https://github.com/abailey81/implicit-interaction-intelligence/security/advisories/new) instead.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: When I call `TCNEncoder.forward(...)`, the output tensor has shape `[B, T, D]` instead of the expected `[B, D]`.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal, reproducible example. Please include code, commands, and input data if relevant.
      placeholder: |
        1. Run `poetry install --with dev`
        2. Execute `poetry run python -m i3.perception.tcn_encoder`
        3. Observe error at line 42
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The encoder should return a pooled embedding of shape `[B, 128]`.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include full error messages and stack traces.
      placeholder: |
        RuntimeError: expected scalar type Float but found Double
        ...
      render: python
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Output of `python --version`
      placeholder: "3.11.7"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (Ubuntu)
        - Linux (Other)
        - macOS
        - Windows
        - Docker container
        - HarmonyOS / Huawei device
        - Other (please specify in description)
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: I³ Version / Commit SHA
      description: Output of `poetry version` or `git rev-parse HEAD`
      placeholder: "1.0.0 or abcdef1"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Additional Environment Details
      description: PyTorch version, CUDA version, hardware (CPU/GPU), any relevant system info.
      placeholder: |
        - PyTorch: 2.2.0
        - CUDA: 12.1 (or CPU-only)
        - Hardware: Apple M2 / NVIDIA RTX 3090 / Huawei Kirin 9000
        - Poetry: 1.8.0
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output. Will be automatically formatted as code.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/abailey81/implicit-interaction-intelligence/blob/main/CODE_OF_CONDUCT.md).
      options:
        - label: I have read and agree to the Code of Conduct
          required: true
        - label: I have searched existing issues and confirmed this is not a duplicate
          required: true
        - label: I have verified this is not a security vulnerability (which should be reported privately)
          required: true
