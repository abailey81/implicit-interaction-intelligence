name: Semgrep SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 2" # Tuesday 06:17 UTC
  workflow_dispatch:

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Semgrep (SARIF for code-scanning)
        run: |
          semgrep ci \
            --sarif --output=semgrep.sarif \
            --metrics=off \
            --config=p/python \
            --config=p/owasp-top-ten \
            --config=p/security-audit \
            --config=p/docker \
            --config=p/github-actions \
            --config=p/bandit \
            --config=p/secrets \
            --config=p/fastapi \
            --config=p/jwt
        env:
          SEMGREP_RULES: >-
            p/python
            p/owasp-top-ten
            p/security-audit
            p/docker
            p/github-actions
            p/bandit
            p/secrets
            p/fastapi
            p/jwt

      - name: Upload SARIF to code-scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 30
