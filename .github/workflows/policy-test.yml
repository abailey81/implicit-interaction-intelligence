name: Policy Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "deploy/policy/**"
      - "i3/authz/**"
      - "tests/test_cedar_authz.py"
      - ".github/workflows/policy-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "deploy/policy/**"
      - "i3/authz/**"
      - "tests/test_cedar_authz.py"
      - ".github/workflows/policy-test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # OPA Rego unit tests
  # ---------------------------------------------------------------------
  opa-rego:
    name: OPA Rego tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/v0.68.0/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: OPA check (v1 syntax)
        run: opa check --v1-compatible deploy/policy/opa/

      - name: OPA test
        run: opa test --v1-compatible deploy/policy/opa/ -v

  # ---------------------------------------------------------------------
  # Cedar CLI validation
  # ---------------------------------------------------------------------
  cedar-validate:
    name: Cedar validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cedar-policy-cli
        run: cargo install --locked cedar-policy-cli --version "4.*"

      - name: Validate Cedar policy
        run: |
          cedar validate \
            --schema deploy/policy/cedar/schema.cedarschema.json \
            --policies deploy/policy/cedar/i3.cedar

  # ---------------------------------------------------------------------
  # Python scenario tests via cedarpy
  # ---------------------------------------------------------------------
  cedar-python:
    name: Cedar scenario tests (cedarpy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry==1.8.0

      - name: Install project + policy group
        run: poetry install --with dev,policy --no-root || poetry install --with dev --no-root

      - name: Install cedarpy (explicit, tolerates missing group)
        run: poetry run pip install "cedarpy>=4.0"

      - name: Run Cedar scenario tests
        run: poetry run pytest tests/test_cedar_authz.py -v

  # ---------------------------------------------------------------------
  # Kyverno manifest lint
  # ---------------------------------------------------------------------
  kyverno-lint:
    name: Kyverno manifest lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kyverno CLI
        run: |
          curl -L -o kyverno.tar.gz \
            https://github.com/kyverno/kyverno/releases/download/v1.12.5/kyverno-cli_v1.12.5_linux_x86_64.tar.gz
          tar -xzf kyverno.tar.gz
          sudo mv kyverno /usr/local/bin/kyverno
          kyverno version

      - name: Validate Kyverno policies
        run: kyverno validate deploy/policy/kyverno/ -v 2
