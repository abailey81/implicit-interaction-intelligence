name: Trivy Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 3" # Wednesday 05:23 UTC
  workflow_dispatch:

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fs-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy-fs.sarif
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: "0"

      - name: Upload filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Fail on CRITICAL findings (filesystem)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: "."
          severity: CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: "1"
          format: table

  config-scan:
    name: Trivy config scan (IaC)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Trivy config scan (SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: "."
          format: sarif
          output: trivy-config.sarif
          severity: "CRITICAL,HIGH,MEDIUM"
          trivyignores: .trivyignore
          exit-code: "0"

      - name: Upload config SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Fail on CRITICAL config findings
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: "."
          severity: CRITICAL
          trivyignores: .trivyignore
          exit-code: "1"
          format: table

  image-scan:
    name: Trivy image scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    # Only runs on main or tagged pushes where an image was built by docker.yml.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Determine image reference
        id: image
        run: |
          IMAGE="ghcr.io/abailey81/i3"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="sha-${GITHUB_SHA::7}"
          fi
          echo "ref=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy image scan (SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        continue-on-error: true
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: sarif
          output: trivy-image.sarif
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: "0"

      - name: Upload image SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Fail on CRITICAL image findings
        if: hashFiles('trivy-image.sarif') != ''
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          severity: CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: "1"
          format: table
