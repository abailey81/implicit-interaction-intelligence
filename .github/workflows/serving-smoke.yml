name: serving-smoke

on:
  push:
    branches: [main]
    paths:
      - 'i3/serving/**'
      - 'training/train_encoder_fabric.py'
      - 'training/train_slm_fabric.py'
      - 'training/train_with_accelerate.py'
      - 'training/train_with_deepspeed.py'
      - 'tests/test_fabric_smoke.py'
      - 'tests/test_ray_serve_smoke.py'
      - '.github/workflows/serving-smoke.yml'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'i3/serving/**'
      - 'training/train_encoder_fabric.py'
      - 'training/train_slm_fabric.py'
      - 'training/train_with_accelerate.py'
      - 'training/train_with_deepspeed.py'
      - 'tests/test_fabric_smoke.py'
      - 'tests/test_ray_serve_smoke.py'
      - '.github/workflows/serving-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fabric-smoke:
    name: Fabric + Ray Serve smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip wheel

      - name: Install base runtime
        run: |
          pip install 'torch>=2.6,<3.0' 'numpy>=1.24,<2.0' 'pyyaml>=6.0.1' \
            'pydantic>=2.6' 'fastapi>=0.115' 'scikit-learn>=1.3' 'httpx>=0.27' \
            'aiosqlite>=0.20' 'cryptography>=43.0'

      - name: Install distributed extras
        run: |
          pip install 'lightning>=2.3' 'ray[serve]>=2.10'

      - name: Install test deps
        run: |
          pip install 'pytest>=8.0' 'pytest-asyncio>=0.23' 'pytest-timeout>=2.2'

      - name: Run Fabric smoke tests
        run: pytest tests/test_fabric_smoke.py -v --timeout=120

      - name: Run Ray Serve smoke tests
        run: pytest tests/test_ray_serve_smoke.py -v --timeout=120
