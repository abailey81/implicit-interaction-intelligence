project:
  name: "Implicit Interaction Intelligence"
  version: "1.0.0"
  seed: 42

interaction:
  feature_window: 10
  keystroke_features: true
  linguistic_features: true
  feature_dim: 32

encoder:
  architecture: "tcn"
  input_dim: 32
  hidden_dims: [64, 64, 64, 64]
  kernel_size: 3
  dilations: [1, 2, 4, 8]
  dropout: 0.1
  embedding_dim: 64
  use_layer_norm: true
  use_residual: true

user_model:
  session_ema_alpha: 0.3
  longterm_ema_alpha: 0.1
  baseline_warmup: 5
  deviation_threshold: 1.5
  max_history_sessions: 50

adaptation:
  cognitive_load:
    min_response_length: 10
    max_response_length: 150
    vocabulary_levels: 3
  style_mirror:
    dimensions: 4
    adaptation_rate: 0.2
  emotional_tone:
    warmth_range: [0.0, 1.0]
    default: 0.5
  accessibility:
    detection_threshold: 0.7
    simplification_levels: 3

router:
  arms: ["local_slm", "cloud_llm"]
  bandit_type: "contextual_thompson"
  context_dim: 12
  prior_alpha: 1.0
  prior_beta: 1.0
  exploration_bonus: 0.1
  min_cloud_complexity: 0.6
  privacy_override: true

slm:
  vocab_size: 8000
  max_seq_len: 256
  d_model: 256
  n_heads: 4
  n_layers: 4
  d_ff: 512
  dropout: 0.1
  conditioning_dim: 64
  adaptation_dim: 8
  cross_attention_heads: 2
  use_pre_ln: true
  tie_weights: true
  training:
    batch_size: 32
    learning_rate: 3.0e-4
    warmup_steps: 500
    max_steps: 50000
    gradient_clip: 1.0
    weight_decay: 0.01
    checkpoint_every: 5000
  generation:
    temperature: 0.8
    top_k: 50
    top_p: 0.9
    max_new_tokens: 100
    repetition_penalty: 1.2
  quantization:
    enabled: true
    dtype: "int8"
    method: "dynamic"

cloud:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
  max_tokens: 200
  timeout: 10.0
  fallback_on_error: true

diary:
  db_path: "data/diary.db"
  max_entries: 1000
  session_summary_model: "cloud"
  encrypt_at_rest: true

privacy:
  strip_pii: true
  never_store_raw_text: true
  encrypt_embeddings: true
  encryption_key_env: "I3_ENCRYPTION_KEY"

profiling:
  enabled: true
  benchmark_iterations: 100
  target_devices:
    - name: "Kirin 9000 (Phone)"
      memory_mb: 512
      tops: 2.0
    - name: "Kirin A2 (Wearable)"
      memory_mb: 128
      tops: 0.5
    - name: "Smart Hanhan (IoT)"
      memory_mb: 64
      tops: 0.1

server:
  host: "127.0.0.1"
  port: 8000
  # Explicit allow-list for CORS; wildcard "*" is rejected unless
  # I3_ALLOW_CORS_WILDCARD=1 is set (see server/app.py).  Override
  # with the I3_CORS_ORIGINS environment variable in production.
  cors_origins:
    - "http://localhost:8000"
    - "http://127.0.0.1:8000"
  websocket_ping_interval: 30
